services:
  ai-control-plane:
    build: .
    container_name: ai-control-plane
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    memswap_limit: 512m
    environment:
      OLLAMA_URL: "http://ollama:11434"
      PROMETHEUS_URL: "http://prometheus:9090"
      REDIS_HOST: "ai-redis"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      CONFIG_PATH: "/app/config.yaml"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/azim/ai-call-platform/ai-control-plane/config.yaml:/app/config.yaml:ro
      - ai-infra-reports:/var/log/ai-infra-reports
    networks:
      - app-network
      - ai-network
      - db-network
      - monitoring-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; os.stat('/proc/1/status')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  ai-infra-reports:
    name: ai-infra-reports

networks:
  app-network:
    external: true
  ai-network:
    external: true
  db-network:
    external: true
  monitoring-network:
    external: true
