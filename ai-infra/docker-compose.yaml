# ============================================================
# AI Infrastructure Stack — Shared Services
# Databases, Caches, LLM, and Monitoring
# ============================================================
# DEPLOY ORDER: 1 (start this BEFORE dograh and fazle-ai)
# ENV FILE:     Symlink ../.env into this directory or use:
#               docker compose --env-file ../.env up -d
# ============================================================

services:
  # ── Database ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      db-network:
        aliases:
          - postgres

  # ── Cache / Pub-Sub ──────────────────────────────────────
  redis:
    image: redis:8.0.2-alpine
    container_name: ai-redis
    restart: unless-stopped
    command: >
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD not set}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --save 300 10
      --appendonly yes
      --appendfsync everysec
      --aof-use-rdb-preamble yes
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 768M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD not set}", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      db-network:
        aliases:
          - redis

  # ── Object Storage ───────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY not set}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY not set}
      MINIO_API_CORS_ALLOW_ORIGIN: "https://iamazim.com,https://fazle.iamazim.com"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - minio-data:/data
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      db-network:
        aliases:
          - minio

  # ── Qdrant — Vector Database ─────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      db-network:
        aliases:
          - qdrant

  # ── Ollama — Local LLM Server ─────────────────────────────
  ollama:
    image: ollama/ollama:0.3.14
    container_name: ollama
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_MAX_QUEUE: "2"
      OLLAMA_KEEP_ALIVE: "10m"
      OLLAMA_HOST: "0.0.0.0"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 6G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      ai-network:
        aliases:
          - ollama

  # ── LiveKit — WebRTC Media Server ──────────────────────────
  livekit:
    image: livekit/livekit-server:v1.8.2
    container_name: livekit
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/etc/livekit-entrypoint.sh"]
    command: []
    volumes:
      - ../configs/livekit/livekit.yaml:/etc/livekit-template.yaml:ro
      - ../scripts/livekit-entrypoint.sh:/etc/livekit-entrypoint.sh:ro
    environment:
      VPS_IP: ${VPS_IP:-5.189.131.48}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD not set}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY not set}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET not set}
      LIVEKIT_WEBHOOK_URL: ${LIVEKIT_WEBHOOK_URL:-http://dograh-api:8000/api/v1/livekit/webhook}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          memory: 256M
    ports:
      - "127.0.0.1:7880:7880"
      - "7881:7881"
      - "50000-50200:50000-50200/udp"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7880 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-network
      - db-network

  # ── Coturn — TURN/STUN for NAT Traversal ─────────────────
  coturn:
    image: coturn/coturn:4.6.2-r12-alpine
    container_name: coturn
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/etc/coturn-entrypoint.sh"]
    command: []
    volumes:
      - ../configs/coturn/turnserver.conf:/etc/coturn/turnserver-template.conf:ro
      - ../scripts/coturn-entrypoint.sh:/etc/coturn-entrypoint.sh:ro
      - /etc/letsencrypt/live/iamazim.com/fullchain.pem:/etc/coturn/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/iamazim.com/privkey.pem:/etc/coturn/certs/privkey.pem:ro
    user: root
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49152-49252:49152-49252/udp"
    environment:
      TURN_SECRET: ${TURN_SECRET:?TURN_SECRET not set}
    healthcheck:
      test: ["CMD-SHELL", "netstat -tlnp | grep -q ':3478'"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  # ── Cloudflare Tunnel (optional fallback) ─────────────────
  cloudflared:
    image: cloudflare/cloudflared:2024.10.1
    container_name: cloudflared-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://dograh-api:8000 --metrics 0.0.0.0:2000
    healthcheck:
      test: ["NONE"]
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - app-network

  # ============================================================
  # MONITORING & OBSERVABILITY STACK
  # ============================================================

  # ── Prometheus — Metrics Collection ────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ../configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=5GB"
      - "--web.enable-lifecycle"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - app-network
      - monitoring-network

  # ── Grafana — Dashboards & Visualization ───────────────────
  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD not set}
      GF_SERVER_ROOT_URL: "https://iamazim.com/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards-provisioned:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    ports:
      - "127.0.0.1:3030:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - app-network
      - monitoring-network

  # ── Node Exporter — Host Metrics ───────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)"
    volumes:
      - /:/host:ro,rslave
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    pid: host
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/metrics > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - monitoring-network

  # ── cAdvisor — Container Metrics ───────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - no-new-privileges:true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    networks:
      - monitoring-network

  # ── Loki — Log Aggregation ─────────────────────────────────
  loki:
    image: grafana/loki:3.2.1
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ../configs/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - monitoring-network

  # ── Promtail — Log Shipper ────────────────────────────────
  promtail:
    image: grafana/promtail:3.2.1
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ../configs/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - monitoring-network

# ── Volumes ──────────────────────────────────────────────────
# REVIEW_REQUIRED: Existing volumes may have project-name prefixes
# (e.g., "vps-deploy_postgres_data"). The migration script handles
# detecting and migrating data from old volume names to these
# explicit names. See migration-deploy.sh for details.
# ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: ai-call-platform_postgres_data
  redis_data:
    name: ai-call-platform_redis_data
  minio-data:
    name: ai-call-platform_minio-data
    driver: local
  qdrant_data:
    name: ai-call-platform_qdrant_data
    driver: local
  ollama_data:
    name: ai-call-platform_ollama_data
    driver: local
  prometheus_data:
    name: ai-call-platform_prometheus_data
    driver: local
  grafana_data:
    name: ai-call-platform_grafana_data
    driver: local
  loki_data:
    name: ai-call-platform_loki_data
    driver: local

# ── Networks (all external — shared across stacks) ──────────
networks:
  app-network:
    external: true
  db-network:
    external: true
  ai-network:
    external: true
  monitoring-network:
    external: true
