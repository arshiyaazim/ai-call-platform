# ============================================================
# Nginx — fazle.iamazim.com (Fazle Personal AI Dashboard)
# Routes: UI (default), Fazle API (/api/fazle/)
# ============================================================

limit_req_zone $binary_remote_addr zone=fazle_limit:10m rate=20r/s;

upstream fazle_ui {
    server 127.0.0.1:3020;
    keepalive 16;
}

# Rolling deploy upstream — managed by deploy-rolling.sh
# Blue slot: 8101, Green slot: 8102, Default: 8100
upstream fazle_api_cluster {
    least_conn;
    include /etc/nginx/upstreams/fazle-api.conf;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name fazle.iamazim.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fazle.iamazim.com;

    ssl_certificate /etc/letsencrypt/live/iamazim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iamazim.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/xml image/svg+xml;

    client_max_body_size 50M;

    # ── Fazle API routes ────────────────────────────────────
    location /api/fazle/ {
        limit_req zone=fazle_limit burst=30 nodelay;

        proxy_pass http://fazle_api_cluster/fazle/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Fazle API health ────────────────────────────────────
    location /health {
        proxy_pass http://fazle_api_cluster/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Fazle API docs (disabled in production) ─────────────
    location /docs {
        deny all;
        return 404;
    }

    location /openapi.json {
        deny all;
        return 404;
    }

    # ── UI (default route) ──────────────────────────────────
    location / {
        limit_req zone=fazle_limit burst=20 nodelay;

        proxy_pass http://fazle_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # ── Block sensitive paths ───────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
