apiVersion: 1
providers:
  - name: "default"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards-provisioned
      foldersFromFilesStructure: false
  - name: "fazle-ai"
    orgId: 1
    folder: "Fazle AI"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards-fazle-ai
      foldersFromFilesStructure: false
