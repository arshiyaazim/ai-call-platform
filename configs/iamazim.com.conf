# ============================================================
# Nginx — iamazim.com (Main Domain → Fazle AI System)
# Updated: 2026-04-17 — migrated from Dograh to Fazle
# ============================================================

limit_req_zone $binary_remote_addr zone=main_limit:10m rate=20r/s;

upstream fazle_ui_main {
    server 127.0.0.1:3020;
    keepalive 16;
}

# Rolling deploy upstream — managed by deploy-rolling.sh
upstream fazle_api_main {
    least_conn;
    include /etc/nginx/upstreams/fazle-api.conf;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name iamazim.com www.iamazim.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://iamazim.com$request_uri;
    }
}

# www → non-www redirect
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.iamazim.com;

    ssl_certificate /etc/letsencrypt/live/iamazim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iamazim.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://iamazim.com$request_uri;
}

# HTTPS — main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name iamazim.com;

    ssl_certificate /etc/letsencrypt/live/iamazim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iamazim.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/xml image/svg+xml;

    client_max_body_size 50M;

    # ── WBOM API routes (before general fazle catch-all) ────
    location /api/fazle/wbom/ {
        limit_req zone=main_limit burst=30 nodelay;

        proxy_pass http://127.0.0.1:9900/api/wbom/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Fazle API routes ────────────────────────────────────
    location /api/fazle/ {
        limit_req zone=main_limit burst=30 nodelay;

        proxy_pass http://fazle_api_main/fazle/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Health check ────────────────────────────────────────
    location /health {
        proxy_pass http://fazle_api_main/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Grafana (internal monitoring) ───────────────────────
    location /grafana/ {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://127.0.0.1:3030/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Legal pages ─────────────────────────────────────────
    location /legal/privacy {
        alias /var/www/iamazim.com/legal/privacy.html;
        default_type text/html;
    }

    location /legal/terms {
        alias /var/www/iamazim.com/legal/terms.html;
        default_type text/html;
    }

    location /legal/contact {
        alias /var/www/iamazim.com/legal/contact.html;
        default_type text/html;
    }

    # ── Block API docs in production ────────────────────────
    location /docs {
        deny all;
        return 404;
    }

    location /openapi.json {
        deny all;
        return 404;
    }

    # ── UI (default route) ──────────────────────────────────
    location / {
        limit_req zone=main_limit burst=20 nodelay;

        proxy_pass http://fazle_ui_main;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # ── Block sensitive paths ───────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
