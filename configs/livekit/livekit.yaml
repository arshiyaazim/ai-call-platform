# ============================================================
# LiveKit Server Configuration — Production Optimized
# Real-time WebRTC audio/video streaming for AI Voice Agents
# Tuned for low-latency voice AI on Contabo VPS
# ============================================================

port: 7880
rtc:
  port_range_start: 50000
  port_range_end: 50200
  tcp_port: 7881
  use_external_ip: true
  enable_loopback_candidate: false

redis:
  address: redis:6379
  password: ${REDIS_PASSWORD}

turn:
  enabled: true
  domain: turn.iamazim.com
  tls_port: 5349
  udp_port: 3478
  external_tls: true
  relay_range_start: 49152
  relay_range_end: 49252

keys:
  ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}

logging:
  level: info
  json: true

room:
  auto_create: true
  max_participants: 50
  empty_timeout: 300
  departure_timeout: 30

webhook:
  urls:
    - ${LIVEKIT_WEBHOOK_URL}
    - ${AI_AGENT_WEBHOOK_URL}
  api_key: ${LIVEKIT_API_KEY}

limit:
  num_tracks: 50
  bytes_per_sec: 10000000
